<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">

    <a class="navbar-brand fw-bold" routerLink="/">
      <span class="text-primary">MPP</span> Piura
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">

        <ng-container *ngIf="userLoginOn">

          <li class="nav-item">
            <a class="nav-link"
               [routerLink]="userRole === 'ROLE_ADMIN' ? '/dashboard' : '/mi-panel-socio'"
               routerLinkActive="active">
              <i class="bi bi-house-door me-1"></i> Panel
            </a>
          </li>

          <ng-container *ngIf="userRole === 'ROLE_ADMIN'">
            <li class="nav-item">
              <a class="nav-link" routerLink="/socios" routerLinkActive="active">Socios</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/puestos" routerLinkActive="active">Puestos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/reportes" routerLinkActive="active">Reportes</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/admin/users" routerLinkActive="active">Usuarios</a>
            </li>
          </ng-container>

          <ng-container *ngIf="userRole === 'ROLE_USER'">
            <li class="nav-item">
              <a class="nav-link" routerLink="/mis-deudas" routerLinkActive="active">Mis Deudas</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" routerLink="/panel-socio" routerLinkActive="active">Mi Panel</a>
            </li>
          </ng-container>

          <li class="nav-item ms-lg-3">
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" (click)="logout()">
              <i class="bi bi-box-arrow-right me-1"></i> Salir
            </button>
          </li>
        </ng-container>

        <ng-container *ngIf="!userLoginOn">
          <li class="nav-item">
            <a class="btn btn-primary btn-sm px-4 rounded-pill" routerLink="/iniciar-sesion">
              Iniciar Sesión
            </a>
          </li>
        </ng-container>

      </ul>
    </div>
  </div>
</nav>

<div *ngIf="userLoginOn" class="bg-light py-2 border-bottom shadow-sm">
  <div class="container d-flex justify-content-end align-items-center">
    <small class="text-muted me-2">
      <i class="bi bi-person-circle"></i> Conectado como:
    </small>
    <span class="badge rounded-pill" [ngClass]="userRole === 'ROLE_ADMIN' ? 'bg-danger' : 'bg-success'">
      {{ userRole === 'ROLE_ADMIN' ? 'Administrador' : 'Socio Activo' }}
    </span>
  </div>
</div>
