<div class="login-wrapper">
  <div class="login-card shadow-lg">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-white">Crea tu Cuenta</h2>
      <p class="text-white-50">Únete al sistema APROMEC</p>
    </div>

    <div class="alert alert-danger d-flex align-items-center py-2" *ngIf="registerError">
      <i class="bi bi-exclamation-octagon-fill me-2"></i>
      <small>{{ registerError }}</small>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">

      <!-- NOMBRES Y APELLIDOS -->
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label text-white-50 small">Nombres</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 custom-icon-box">
              <i class="bi bi-person text-white-50"></i>
            </span>
            <input formControlName="nombres" type="text"
                   class="form-control custom-input border-start-0"
                   placeholder="Tus nombres"
                   [class.is-invalid]="registerForm.get('nombres')?.invalid && registerForm.get('nombres')?.touched">
          </div>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label text-white-50 small">Apellidos</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 custom-icon-box">
              <i class="bi bi-person-badge text-white-50"></i>
            </span>
            <input formControlName="apellidos" type="text"
                   class="form-control custom-input border-start-0"
                   placeholder="Tus apellidos"
                   [class.is-invalid]="registerForm.get('apellidos')?.invalid && registerForm.get('apellidos')?.touched">
          </div>
        </div>
      </div>

      <!-- DNI -->
      <div class="mb-3">
        <label class="form-label text-white-50 small">DNI</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 custom-icon-box">
            <i class="bi bi-card-text text-white-50"></i>
          </span>
          <input formControlName="dni" type="text"
                 class="form-control custom-input border-start-0"
                 placeholder="12345678"
                 maxlength="8"
                 [class.is-invalid]="registerForm.get('dni')?.invalid && registerForm.get('dni')?.touched">
        </div>
      </div>

      <!-- TELEFONO -->
      <div class="mb-3">
        <label class="form-label text-white-50 small">Teléfono</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 custom-icon-box">
            <i class="bi bi-telephone text-white-50"></i>
          </span>
          <input formControlName="telefono" type="text"
                 class="form-control custom-input border-start-0"
                 placeholder="999 999 999">
        </div>
      </div>

      <!-- DIRECCION -->
      <div class="mb-3">
        <label class="form-label text-white-50 small">Dirección</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 custom-icon-box">
            <i class="bi bi-geo-alt text-white-50"></i>
          </span>
          <input formControlName="direccion" type="text"
                 class="form-control custom-input border-start-0"
                 placeholder="Tu dirección">
        </div>
      </div>

      <!-- USERNAME -->
      <div class="mb-3">
        <label class="form-label text-white-50 small">Correo Electrónico</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 custom-icon-box">
            <i class="bi bi-envelope text-white-50"></i>
          </span>
          <input formControlName="username" type="email"
                 class="form-control custom-input border-start-0"
                 placeholder="ejemplo@gmail.com"
                 [class.is-invalid]="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="mb-4">
        <label class="form-label text-white-50 small">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 custom-icon-box">
            <i class="bi bi-lock text-white-50"></i>
          </span>
          <input formControlName="password" type="password"
                 class="form-control custom-input border-start-0"
                 placeholder="Mínimo 6 caracteres"
                 [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        </div>
      </div>

      <!-- BOTON -->
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-login fw-bold" [disabled]="registerForm.invalid">
          <i class="bi bi-check-circle-fill me-2"></i>Registrarse
        </button>

        <div class="text-center mt-3">
          <p class="text-white-50 small mb-2">¿Ya tienes cuenta?</p>
          <a routerLink="/iniciar-sesion" class="btn btn-outline-light-custom btn-sm w-100">
            Volver al Login
          </a>
        </div>
      </div>

    </form>
  </div>
</div>
