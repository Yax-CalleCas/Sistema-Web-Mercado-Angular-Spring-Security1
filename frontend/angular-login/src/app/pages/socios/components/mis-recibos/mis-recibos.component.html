<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
  <div class="card-header bg-white py-3 border-0">
    <div class="d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold text-dark">Historial de Pagos</h5>
      <button class="btn btn-light btn-sm rounded-circle" (click)="cargarRecibos()">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </div>

  <div class="card-body p-0">
    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Consultando historial...</p>
    </div>

    <div class="table-responsive" *ngIf="!loading && recibos.length > 0">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light text-muted small text-uppercase">
        <tr>
          <th class="ps-4">ID</th>
          <th>Fecha</th>
          <th>Concepto</th>
          <th>Método</th>
          <th>Monto</th>
          <th class="text-center">Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let r of recibos">
          <td class="ps-4 fw-bold text-muted">#{{ r.id }}</td>
          <td>{{ r.fechaPago | date:'dd/MM/yyyy' }}</td>
          <td>
            <span class="d-block fw-bold text-dark">{{ r.concepto }}</span>
            <small class="text-muted" *ngIf="r.puesto">Puesto: {{ r.puesto.codigo }}</small>
          </td>
          <td>
              <span class="badge rounded-pill bg-light text-dark border">
                <i class="bi bi-credit-card-2-back me-1"></i> {{ r.metodoPago }}
              </span>
          </td>
          <td>
            <span class="fw-bold text-primary">S/ {{ r.montoTotal | number:'1.2-2' }}</span>
          </td>
          <td class="text-center">
            <button class="btn btn-outline-primary btn-sm rounded-pill px-3" (click)="imprimirRecibo(r)">
              <i class="bi bi-download me-1"></i> Recibo
            </button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="!loading && recibos.length === 0" class="text-center py-5">
      <i class="bi bi-receipt text-muted opacity-25" style="font-size: 3rem;"></i>
      <p class="text-muted mt-3">Aún no tienes pagos registrados.</p>
    </div>
  </div>
</div>
