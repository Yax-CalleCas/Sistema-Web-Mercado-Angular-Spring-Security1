<div class="animate__animated animate__fadeInUp">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold"><i class="bi bi-search me-2"></i>Puestos Disponibles</h4>
    <span class="badge bg-success">{{ puestosDisponibles.length }} encontrados</span>
  </div>

  <div class="row g-3">
    <div class="col-md-4" *ngFor="let p of puestosDisponibles">
      <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden card-puesto">
        <img [src]="p.imagenUrl || 'https://via.placeholder.com/400x200'" class="card-img-top" style="height: 160px; object-fit: cover;">

        <div class="card-body">
          <div class="d-flex justify-content-between mb-2">
            <span class="badge bg-light text-dark border">{{ p.codigo }}</span>
            <span class="badge bg-info" *ngIf="p.esAsociacion">Asociación</span>
          </div>
          <h6 class="fw-bold mb-1">{{ p.ubicacion }}</h6>

          <div class="bg-light p-2 rounded-3 my-3">
            <div class="d-flex justify-content-between small">
              <span class="text-muted">Alquiler:</span>
              <span class="fw-bold text-success">S/ {{ p.precioAlquiler }}</span>
            </div>
            <div class="d-flex justify-content-between small" *ngIf="!p.serviciosIncluidos">
              <span class="text-muted">Agua/Luz (Fijo):</span>
              <span class="text-dark">S/ {{ p.costoAguaFijo + p.costoLuzFijo }}</span>
            </div>
          </div>

          <button class="btn btn-primary w-100 rounded-3 fw-bold" (click)="alquilar(p)">
            Alquilar Ahora
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
