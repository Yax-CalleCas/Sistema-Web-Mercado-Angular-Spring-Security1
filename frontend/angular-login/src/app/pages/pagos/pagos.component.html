<div class="container py-4">

  <h3 class="mb-4">💳 Mis Pagos</h3>

  <!-- 🔥 BOTONES DE PAGO -->
  <div class="card p-3 mb-4 shadow-sm">
    <h5>Pagar puesto</h5>

    <div class="row">
      <div class="col-md-6 mb-3" *ngFor="let p of puestosDemo">
        <div class="border rounded p-3 d-flex justify-content-between align-items-center">
          <div>
            <strong>{{ p.codigo }}</strong>
            <div class="text-muted">S/ {{ p.precioAlquiler }}</div>
          </div>

          <button class="btn btn-success btn-sm" (click)="pagar(p)">
            💳 Pagar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 📄 HISTORIAL -->
  <div class="card p-3 shadow-sm">
    <h5>📄 Historial de pagos</h5>

    <div *ngIf="loading">Cargando...</div>

    <table class="table table-sm" *ngIf="!loading">
      <thead>
      <tr>
        <th>Monto</th>
        <th>Concepto</th>
        <th>Estado</th>
        <th>Fecha</th>
      </tr>
      </thead>

      <tbody>
      <tr *ngFor="let pago of pagos">
        <td>S/ {{ pago.montoTotal }}</td>
        <td>{{ pago.concepto }}</td>
        <td>
            <span class="badge"
                  [ngClass]="{
                'bg-success': pago.estado === 'APROBADO',
                'bg-warning': pago.estado === 'PENDIENTE',
                'bg-danger': pago.estado === 'RECHAZADO'
              }">
              {{ pago.estado }}
            </span>
        </td>
        <td>{{ pago.fechaPago | date:'short' }}</td>
      </tr>
      </tbody>
    </table>

  </div>
</div>
